worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Main site: softprobe.ai
    server {
        listen 80;
        server_name softprobe.ai www.softprobe.ai localhost;

        root /var/www/main;
        index index.html;

        error_page 404 /404.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Context Subdomain: context.softprobe.ai
    server {
        listen 80;
        server_name context.softprobe.ai;

        root /var/www/context;
        index index.html;

        error_page 404 /404.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # SRE Subdomain: sre.softprobe.ai
    server {
        listen 80;
        server_name sre.softprobe.ai;

        root /var/www/sre;
        index index.html;

        error_page 404 /404.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
